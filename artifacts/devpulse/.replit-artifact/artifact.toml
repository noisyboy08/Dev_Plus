kind = "web"
previewPath = "/"
title = "DevPulse"
version = "1.0.0"
id = "artifacts/devpulse"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21976

[services.development]
run = "pnpm --filter @workspace/devpulse run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/devpulse", "run", "build" ]
publicDir = "artifacts/devpulse/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21976"
BASE_PATH = "/"
